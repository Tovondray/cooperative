{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="login-box">
        <div class="header-content">
            <img src="{% static 'images/logofiarako.png' %}" class="logo" alt="Fiarako">
            <div class="title-group">
                <h2>Bienvenue !</h2>
                <p>Connectez-vous à votre espace</p>
            </div>
        </div>

        <!-- Affichage des messages d'erreur -->
        {% if form.errors %}
            <div class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span>Nom d'utilisateur ou mot de passe incorrect.</span>
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" placeholder="Entrez votre nom" value="{{ form.username.value|default_if_none:'' }}">
            </div>

            <div class="input-group">
                <label>Mot de passe</label>
                <div class="password-box">
                    <input type="password" id="password" name="password" placeholder="••••••••">
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword()"></i>
                </div>
            </div>

            <div class="mdpforgotten">
                <label class="remember">
                    <input type="checkbox" name="remember">
                    <span>Se souvenir de moi</span>
                </label>
                <a href="#" class="forgot-password">Mot de passe oublié ?</a>
            </div>

            <button type="submit">Se connecter</button>

            <p class="divider">------------------- ou -------------------</p>

            <div class="inscription">
                <p>Première connexion ? <a href="{% url 'comptes:register' %}">Créer un compte</a></p>
            </div>
        </form>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById("password");
            const icon = document.querySelector(".toggle-password");
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>
</body>
</html>
